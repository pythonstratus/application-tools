spring:
  application:
    name: application-tools-service

server:
  port: 8081
  servlet:
    context-path: /api/application-tools

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.company.applicationtools: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
